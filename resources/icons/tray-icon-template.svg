<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 22 22">
  <!-- SimOffice tray icon — simple building silhouette -->
  <!-- macOS Template image: black fill, system handles light/dark -->
  <!-- Main building -->
  <rect x="6" y="3" width="10" height="16" rx="1" fill="black"/>
  <!-- Left wing -->
  <rect x="3" y="8" width="4" height="11" rx="1" fill="black"/>
  <!-- Right wing -->
  <rect x="15" y="8" width="4" height="11" rx="1" fill="black"/>
  <!-- Windows row 1 -->
  <rect x="8" y="5" width="2" height="1.5" rx="0.3" fill="white"/>
  <rect x="12" y="5" width="2" height="1.5" rx="0.3" fill="white"/>
  <!-- Windows row 2 -->
  <rect x="8" y="8" width="2" height="1.5" rx="0.3" fill="white"/>
  <rect x="12" y="8" width="2" height="1.5" rx="0.3" fill="white"/>
  <!-- Windows row 3 -->
  <rect x="8" y="11" width="2" height="1.5" rx="0.3" fill="white"/>
  <rect x="12" y="11" width="2" height="1.5" rx="0.3" fill="white"/>
  <!-- Door -->
  <rect x="9.5" y="15" width="3" height="4" rx="0.5" fill="white"/>
</svg>
